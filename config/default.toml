# ============================================================
# hypr-download-sorter
#
# Default configuration.
#
# Every category will be moved into its corresponding directory.
# ============================================================

[directories]

images = "~/Pictures"
videos = "~/Videos"
documents = "~/Documents"
archives = "~/Archives"
audio = "~/Music"
executables = "~/Applications"
others = "~/Downloads/Others"

[watch]

directory = "~/Downloads"

debounce_ms = 500

stability_check_ms = 300

stability_checks = 3

[notifications]

enabled = true

[logging]

level = "info"